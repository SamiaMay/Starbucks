<!DOCTYPE html>
<html lang="pt-br">

<head>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Starbucks</title>

</head>

<body>
    <div class="circulo"></div>

    <img src="https//smay-starbucks-7aacf5.netlify.app/logo.png" alt="logo starbucks" class="logo">

    <div class="conteudo">
        <div class="caixa-texto">
            <h2> Não é apenas Café, é um <span>Starbucks</span></h2>
            <p>Descubra o que torna a Starbucks tão única, o nosso compromisso de conexão humana e café de qualidade, 
                as nossas cafeterias acolhedoras e os cafés deliciosos que pode desfrutar em casa.</p>

            <button>Deixe o seu LIKE</button>
        </div>

        <div class="caixa-imagem">
            <img src="https//smay-starbucks-7aacf5.netlify.app/img1.png" alt="copo starbucks" class="starbucks">
        </div>
    </div>

    <div class="menu">
        <img src="https//smay-starbucks-7aacf5.netlify.app/img-pequena1.png" class="copo-pequeno verde">
        <img src="https//smay-starbucks-7aacf5.netlify.app/img-pequena2.png" class="copo-pequeno amarelo">
        <img src="https//smay-starbucks-7aacf5.netlify.app/img-pequena3.png" class="copo-pequeno rosa">
    </div>
</body>
<script>
   let circulo = document.querySelector(".circulo")
   let imgCopo = document.querySelector(".starbucks")
   let verde = document.querySelector(".verde")
   let amarelo = document.querySelector(".amarelo")
   let rosa = document.querySelector(".rosa")

   verde.addEventListener("click", () => {
       imgCopo.src = "https//smay-starbucks-7aacf5.netlify.app/img1.png"
       circulo.style.background = "#017143"
   })

   amarelo.addEventListener("click", () => {
       imgCopo.src = "https//smay-starbucks-7aacf5.netlify.app/img2.png"
       circulo.style.background = "#eb7495"
   })

   rosa.addEventListener("click", () => {
       imgCopo.src = "https//smay-starbucks-7aacf5.netlify.app/img3.png"
       circulo.style.background = "#d752b1"
   })

</script>

</html>
